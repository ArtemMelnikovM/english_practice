<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HR Interview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #e8e8e8;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.5rem 2rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      flex-shrink: 0;
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.5rem 0.85rem;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      color: rgba(232, 232, 232, 0.9);
      text-decoration: none;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .btn-back:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.25);
    }

    .header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .layout {
      flex: 1;
      display: flex;
      gap: 1.5rem;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      padding: 2rem;
      min-height: 0;
    }

    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      min-width: 0;
    }

    .messages {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      overflow-y: auto;
      min-height: 200px;
    }

    .message {
      padding: 1rem 1.25rem;
      border-radius: 12px;
      max-width: 85%;
      line-height: 1.5;
    }

    .message.hr {
      align-self: flex-start;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .message.user {
      align-self: flex-end;
      background: rgba(233, 69, 96, 0.25);
      border: 1px solid rgba(233, 69, 96, 0.4);
    }

    .message-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      opacity: 0.7;
      margin-bottom: 0.35rem;
    }

    .message-text {
      font-size: 1rem;
    }

    .message.loading .message-text {
      font-style: italic;
      opacity: 0.8;
    }

    .message.error .message-text {
      color: #ff6b6b;
    }

    .input-block {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .input-block-label {
      font-size: 0.8rem;
      font-weight: 600;
      opacity: 0.8;
    }

    .input-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: flex-start;
    }

    .user-input {
      flex: 1 1 220px;
      min-width: 0;
      width: 100%;
      padding: 1rem 1.25rem;
      font-family: inherit;
      font-size: 1rem;
      color: #e8e8e8;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      resize: none;
      min-height: 52px;
      max-height: 120px;
      transition: border-color 0.2s, background 0.2s;
    }

    .user-input::placeholder {
      color: rgba(232, 232, 232, 0.4);
    }

    .user-input:focus {
      outline: none;
      border-color: rgba(233, 69, 96, 0.6);
      background: rgba(255, 255, 255, 0.08);
    }

    .btn-send {
      padding: 1rem 1.5rem;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      color: #1a1a2e;
      background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      flex-shrink: 0;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-send:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(233, 69, 96, 0.4);
    }

    .btn-send:active {
      transform: translateY(0);
    }

    .btn-send:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .input-actions {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    .btn-translate {
      padding: 1rem 1.25rem;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      color: #e8e8e8;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s, border-color 0.2s;
    }

    .btn-translate:hover:not(:disabled),
    .btn-dict:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .btn-translate:disabled,
    .btn-dict:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-dict {
      padding: 1rem 1.25rem;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      color: #e8e8e8;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s, border-color 0.2s;
    }

    .dict-status {
      font-size: 0.85rem;
      line-height: 1.45;
      color: rgba(232, 232, 232, 0.65);
      margin: 0;
      min-height: 1.35em;
    }

    .dict-status.dict-status-error {
      color: #ff8a8a;
    }

    .dict-status.dict-status-ok {
      color: rgba(144, 238, 144, 0.85);
    }

    .translation-panel {
      margin-top: 0.75rem;
      padding: 1rem 1.15rem;
      font-size: 0.9rem;
      line-height: 1.55;
      background: rgba(0, 0, 0, 0.22);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      max-height: min(50vh, 420px);
      overflow-y: auto;
    }

    .translation-panel[hidden] {
      display: none !important;
    }

    .translation-panel-title {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      opacity: 0.75;
      margin-bottom: 0.65rem;
    }

    .translation-variant {
      padding: 0.75rem 0.85rem;
      margin-bottom: 0.65rem;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .translation-variant:last-child {
      margin-bottom: 0;
    }

    .translation-variant-en {
      font-weight: 600;
      color: #fff;
      margin-bottom: 0.4rem;
    }

    .translation-variant-ex {
      font-size: 0.88rem;
      color: rgba(232, 232, 232, 0.85);
      font-style: italic;
      margin-bottom: 0.4rem;
      word-break: break-word;
    }

    .translation-variant-note {
      font-size: 0.85rem;
      color: rgba(232, 232, 232, 0.75);
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    .translation-panel .translation-msg {
      color: rgba(232, 232, 232, 0.65);
      font-size: 0.88rem;
    }

    .translation-panel .translation-error {
      color: #ff8a8a;
    }

    .feedback-wrap {
      margin-top: 0.5rem;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      padding-top: 0.5rem;
    }

    .feedback-toggle {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.25rem 0.5rem;
      font-family: inherit;
      font-size: 0.8rem;
      color: rgba(232, 232, 232, 0.9);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .feedback-toggle:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.25);
    }

    .feedback-toggle .stars {
      color: #f0c14b;
    }

    .feedback-detail {
      margin-top: 0.5rem;
      padding: 1rem 1rem;
      font-size: 0.9rem;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: none;
    }

    .feedback-detail.expanded {
      display: block;
    }

    @media (max-width: 980px) {
      .layout {
        flex-direction: column;
      }
    }

    @media (max-width: 640px) {
      .header {
        padding: 1rem 1rem;
      }

      .layout {
        padding: 1rem;
      }

      .input-row {
        flex-direction: column;
        align-items: stretch;
      }

      .input-actions {
        flex-direction: row;
        width: 100%;
      }

      .input-actions .btn-send,
      .input-actions .btn-translate,
      .input-actions .btn-dict {
        flex: 1;
        min-width: 0;
      }

      .user-input {
        flex: none;
        width: 100%;
      }
    }

  </style>
</head>
<body>
  <header class="header">
    <a href="index.html" class="btn-back">← Menu</a>
    <h1>HR Interview</h1>
  </header>

  <main class="layout">
    <section class="chat-main">
      <div class="messages" id="messages">
        <!-- Сообщения от HR -->
      </div>

      <div class="input-block">
        <label class="input-block-label" for="userInput">Your answer</label>
        <div class="input-row">
          <textarea
            class="user-input"
            id="userInput"
            placeholder="Type your answer to the interviewer in English…"
            rows="2"
          ></textarea>
          <div class="input-actions">
            <button class="btn-send" type="button" id="btnSend">Send</button>
          </div>
        </div>
      </div>

      <div class="input-block">
        <label class="input-block-label" for="toolsInput">Translate &amp; vocabulary</label>
        <div class="input-row">
          <textarea
            class="user-input"
            id="toolsInput"
            placeholder="Russian text to translate, or an English word/phrase to add to your dictionary…"
            rows="2"
            autocomplete="off"
          ></textarea>
          <div class="input-actions">
            <button class="btn-translate" type="button" id="btnTranslate">Translate</button>
            <button class="btn-dict" type="button" id="btnAddWord">Add word</button>
          </div>
        </div>
        <div class="dict-add-list-row">
          <span>Add to vocabulary list:</span>
          <label><input type="radio" name="addWordListInterview" value="it"> IT</label>
          <label><input type="radio" name="addWordListInterview" value="general" checked> General</label>
        </div>
        <div class="translation-panel" id="translationPanel" hidden>
          <div class="translation-panel-title">English options</div>
          <div id="translationPanelBody" class="translation-msg" aria-live="polite"></div>
        </div>
        <p class="dict-status" id="dictStatus" role="status" aria-live="polite"></p>
      </div>
    </section>
  </main>

  <script src="api-config.js"></script>
  <script>
    const messagesEl = document.getElementById('messages');
    const userInputEl = document.getElementById('userInput');
    const toolsInputEl = document.getElementById('toolsInput');
    const btnSend = document.getElementById('btnSend');
    const btnTranslate = document.getElementById('btnTranslate');
    const btnAddWord = document.getElementById('btnAddWord');
    const translationPanel = document.getElementById('translationPanel');
    const translationPanelBody = document.getElementById('translationPanelBody');
    const dictStatusEl = document.getElementById('dictStatus');

    const DICT_STORAGE_KEY = 'hr-interview-examples';

    const TRANSLATION_SYSTEM_PROMPT =
      'You help candidates prepare for English job interviews. The user will send text that may be in Russian (or mixed). ' +
      'Suggest 2–4 natural English ways to express the same idea in an interview (professional but conversational). ' +
      'For each variant provide: (1) english — the phrase or short sentence in English; (2) example — one English example sentence showing use in an interview answer; (3) note_ru — a brief explanation in Russian about tone, register, or when this wording fits best. ' +
      'Reply with a single JSON object, no markdown: {"variants":[{"english":"...","example":"...","note_ru":"..."},...]}';

    function parseTranslationResponse(content) {
      var raw = (content || '').trim();
      raw = raw.replace(/^```(?:json)?\s*/i, '').replace(/\s*```$/i, '');
      var jsonStr = raw.match(/\{[\s\S]*\}/);
      if (jsonStr) jsonStr = jsonStr[0];
      else jsonStr = raw;
      try {
        var parsed = JSON.parse(jsonStr);
        var variants = parsed.variants;
        if (!Array.isArray(variants)) return [];
        return variants.map(function (v) {
          return {
            english: typeof v.english === 'string' ? v.english : '',
            example: typeof v.example === 'string' ? v.example : (typeof v.ex === 'string' ? v.ex : ''),
            note_ru: typeof v.note_ru === 'string' ? v.note_ru : (typeof v.note === 'string' ? v.note : '')
          };
        }).filter(function (v) { return v.english; });
      } catch (_) {
        return [];
      }
    }

    async function getTranslationSuggestions(russianOrMixed) {
      var text = (russianOrMixed || '').trim();
      if (!text) return { variants: [] };
      const response = await fetchWithTimeout('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + getOpenAiApiKey()
        },
        body: JSON.stringify({
          model: 'gpt-5-mini-2025-08-07',
          messages: [
            { role: 'system', content: TRANSLATION_SYSTEM_PROMPT },
            { role: 'user', content: text }
          ],
          response_format: { type: 'json_object' }
        })
      });
      if (!response.ok) {
        var err = await response.json().catch(function () { return { error: { message: response.statusText } }; });
        throw new Error(err.error && err.error.message ? err.error.message : 'Translation request failed');
      }
      var data = await response.json();
      var content = data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content
        ? data.choices[0].message.content.trim() : '';
      var variants = parseTranslationResponse(content);
      return { variants: variants };
    }

    function renderTranslationPanel(variants, errorMsg) {
      translationPanel.hidden = false;
      translationPanelBody.className = '';
      translationPanelBody.innerHTML = '';
      if (errorMsg) {
        translationPanelBody.className = 'translation-msg translation-error';
        translationPanelBody.textContent = errorMsg;
        return;
      }
      if (!Array.isArray(variants)) return;
      if (variants.length === 0) {
        translationPanelBody.className = 'translation-msg';
        translationPanelBody.textContent = 'No variants returned. Try rephrasing your text.';
        return;
      }
      variants.forEach(function (v) {
        var block = document.createElement('div');
        block.className = 'translation-variant';
        block.innerHTML =
          '<div class="translation-variant-en">' + escapeHtml(v.english) + '</div>' +
          (v.example ? '<div class="translation-variant-ex">Example: ' + escapeHtml(v.example) + '</div>' : '') +
          (v.note_ru ? '<div class="translation-variant-note">' + escapeHtml(v.note_ru) + '</div>' : '');
        translationPanelBody.appendChild(block);
      });
    }

    async function runTranslate() {
      var text = toolsInputEl.value.trim();
      if (!text) {
        renderTranslationPanel(null, 'Enter text to translate in the field above.');
        return;
      }
      if (!getOpenAiApiKey()) {
        renderTranslationPanel(null, 'Add your OpenAI API key in Settings (main menu).');
        return;
      }
      btnTranslate.disabled = true;
      translationPanel.hidden = false;
      translationPanelBody.className = 'translation-msg';
      translationPanelBody.textContent = 'Getting suggestions…';
      try {
        var result = await getTranslationSuggestions(text);
        renderTranslationPanel(result.variants, null);
      } catch (err) {
        renderTranslationPanel(null, err.message || 'Translation failed');
      } finally {
        btnTranslate.disabled = false;
      }
    }

    btnTranslate.addEventListener('click', runTranslate);

    const HR_SYSTEM_PROMPT =
      'You are an HR specialist conducting a job interview. Conduct the dialogue in English: ask relevant questions, react to the candidate\'s answers, and ask follow-up or next questions. Be polite and professional. Keep your replies brief, one or two sentences, in the style of an interviewer.';

    const FIRST_HR_MESSAGE = 'Hello! Please tell us a little about yourself.';

    const conversationHistory = [
      { role: 'system', content: HR_SYSTEM_PROMPT },
      { role: 'assistant', content: FIRST_HR_MESSAGE }
    ];

    function addHrMessage(text, options) {
      const { loading = false, error = false } = options || {};
      const div = document.createElement('div');
      div.className = 'message hr' + (loading ? ' loading' : '') + (error ? ' error' : '');
      div.innerHTML =
        '<div class="message-label">HR</div>' +
        '<div class="message-text">' + escapeHtml(text) + '</div>';
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    function addUserMessage(text) {
      const div = document.createElement('div');
      div.className = 'message user';
      div.innerHTML =
        '<div class="message-label">You</div>' +
        '<div class="message-text">' + escapeHtml(text) + '</div>';
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    function starsFromScore(score) {
      const n = Math.min(5, Math.max(1, Math.round(score)));
      return '★'.repeat(n) + '☆'.repeat(5 - n);
    }

    function formatFeedbackDescription(desc) {
      if (!desc || typeof desc !== 'string') return '';
      var s = desc.replace(/\r\n/g, '\n').replace(/\r/g, '\n').trim();
      s = s.replace(/\n{3,}/g, '\n\n');
      s = s.replace(/\s+(\d+)\.\s+/g, '\n$1. ');
      s = s.replace(/\s+[-•]\s+/g, '\n• ');
      s = s.replace(/\s+\*\s+/g, '\n• ');
      return s.split('\n').map(function (line) { return line.trim(); }).join('\n').replace(/\n\n+/g, '\n\n').trim();
    }

    function attachFeedbackBlock(userMsgEl, blockTitle, analysis) {
      if (!userMsgEl) return;
      const score = analysis && analysis.score != null ? analysis.score : null;
      const descRaw = (analysis && analysis.description) ? analysis.description : 'Feedback could not be loaded.';
      const desc = formatFeedbackDescription(descRaw);
      const hasScore = score != null && score >= 1 && score <= 5;
      const label = hasScore
        ? escapeHtml(blockTitle) + ': <span class="stars">' + escapeHtml(starsFromScore(score)) + '</span> (' + score + '/5)'
        : escapeHtml(blockTitle);
      const wrap = document.createElement('div');
      wrap.className = 'feedback-wrap';
      wrap.innerHTML =
        '<button type="button" class="feedback-toggle" title="' + escapeHtml(descRaw) + '">' + label + '</button>' +
        '<div class="feedback-detail">' + escapeHtml(desc) + '</div>';
      const toggle = wrap.querySelector('.feedback-toggle');
      const detail = wrap.querySelector('.feedback-detail');
      toggle.addEventListener('click', function () {
        detail.classList.toggle('expanded');
      });
      userMsgEl.appendChild(wrap);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function updateLastHrMessage(text, error) {
      const last = messagesEl.querySelector('.message.hr:last-child');
      if (!last) return;
      const textEl = last.querySelector('.message-text');
      if (textEl) {
        textEl.textContent = text;
        last.classList.toggle('loading', false);
        last.classList.toggle('error', !!error);
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    const API_TIMEOUT_MS = 60000;

    function fetchWithTimeout(url, options) {
      const ctrl = new AbortController();
      const id = setTimeout(function () { ctrl.abort(); }, API_TIMEOUT_MS);
      return fetch(url, { ...options, signal: ctrl.signal }).then(function (r) {
        clearTimeout(id);
        return r;
      }, function (err) {
        clearTimeout(id);
        if (err.name === 'AbortError') throw new Error('Request timed out after ' + (API_TIMEOUT_MS / 1000) + 's');
        throw err;
      });
    }

    function getDictionary() {
      try {
        var raw = localStorage.getItem(DICT_STORAGE_KEY);
        var list = raw ? JSON.parse(raw) : [];
        return Array.isArray(list) ? list : [];
      } catch (_) {
        return [];
      }
    }

    function saveDictionary(list) {
      try {
        localStorage.setItem(DICT_STORAGE_KEY, JSON.stringify(list));
      } catch (_) {}
    }

    function setDictStatus(message, kind) {
      if (!dictStatusEl) return;
      dictStatusEl.textContent = message || '';
      dictStatusEl.classList.remove('dict-status-error', 'dict-status-ok');
      if (kind === 'error') dictStatusEl.classList.add('dict-status-error');
      else if (kind === 'ok') dictStatusEl.classList.add('dict-status-ok');
    }

    async function generateDictionaryDetails(word) {
      var systemPrompt = 'You are an English-Russian vocabulary assistant for interview preparation. Given one English word or phrase, return JSON only with: (1) top 3 most common/popular Russian meanings, (2) exactly 3 concise interview-style example sentences in English that naturally use this word/phrase. Keep examples B1-C1 and professional. JSON format: {"translations_ru":["...","...","..."],"examples_en":["...","...","..."]}';
      const response = await fetchWithTimeout('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + getOpenAiApiKey()
        },
        body: JSON.stringify({
          model: 'gpt-5-mini-2025-08-07',
          messages: [
            { role: 'system', content: systemPrompt },
            { role: 'user', content: 'Word/phrase: ' + word }
          ],
          response_format: { type: 'json_object' }
        })
      });
      if (!response.ok) {
        const err = await response.json().catch(() => ({ error: { message: response.statusText } }));
        throw new Error(err.error && err.error.message ? err.error.message : 'Failed to generate word details');
      }
      const data = await response.json();
      const content = data.choices?.[0]?.message?.content?.trim() || '';
      const parsed = JSON.parse(content);
      var ru = Array.isArray(parsed.translations_ru) ? parsed.translations_ru : [];
      var en = Array.isArray(parsed.examples_en) ? parsed.examples_en : [];
      return {
        translationRu: ru.filter(Boolean).slice(0, 3),
        examplesEn: en.filter(Boolean).slice(0, 3)
      };
    }

    async function addWordToDictionary() {
      var t = (toolsInputEl.value || '').trim();
      if (!t) {
        setDictStatus('Enter an English word or phrase.', 'error');
        return;
      }
      var list = getDictionary();
      if (list.some(function (x) { return x.text.toLowerCase() === t.toLowerCase(); })) {
        setDictStatus('This word is already in your dictionary.', 'error');
        return;
      }

      var newId = Date.now();
      var wlEl = document.querySelector('input[name="addWordListInterview"]:checked');
      var wl = wlEl && wlEl.value === 'it' ? 'it' : 'general';
      list.unshift({
        id: newId,
        text: t,
        wordList: wl,
        createdAt: new Date().toISOString(),
        learned: false,
        translationRu: [],
        examplesEn: [],
        detailsReady: false
      });
      saveDictionary(list);
      toolsInputEl.value = '';
      toolsInputEl.dispatchEvent(new Event('input', { bubbles: true }));

      if (!getOpenAiApiKey()) {
        setDictStatus('Word saved. Add an API key in Settings to load Russian meanings and examples.', 'ok');
        return;
      }

      btnAddWord.disabled = true;
      setDictStatus('Loading translations and examples…', 'ok');
      try {
        var details = await generateDictionaryDetails(t);
        var updatedList = getDictionary();
        var item = updatedList.find(function (x) { return x.id === newId; });
        if (!item) return;
        item.translationRu = details.translationRu;
        item.examplesEn = details.examplesEn;
        item.detailsReady = true;
        item.detailsError = '';
        saveDictionary(updatedList);
        setDictStatus('Added to vocabulary with translations and examples.', 'ok');
      } catch (err) {
        var failedList = getDictionary();
        var failedItem = failedList.find(function (x) { return x.id === newId; });
        if (failedItem) {
          failedItem.detailsReady = false;
          failedItem.detailsError = err && err.message ? err.message : 'Failed to generate details';
          saveDictionary(failedList);
        }
        setDictStatus('Word saved, but details could not be loaded: ' + (err && err.message ? err.message : 'unknown error'), 'error');
      } finally {
        btnAddWord.disabled = false;
      }
    }

    async function getChatGptReply() {
      const response = await fetchWithTimeout('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + getOpenAiApiKey()
        },
        body: JSON.stringify({
          model: 'gpt-5-mini-2025-08-07',
          messages: conversationHistory
        })
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({ error: { message: response.statusText } }));
        throw new Error(err.error?.message || 'Ошибка запроса к OpenAI');
      }

      const data = await response.json();
      const content = data.choices?.[0]?.message?.content?.trim();
      if (!content) throw new Error('Empty response from ChatGPT');
      return content;
    }

    const ANALYSIS_SYSTEM_PROMPT =
      'You are an HR evaluator. Given the interview question and the candidate\'s answer, provide a score from 1 to 5 (from an HR perspective: 1 = very weak, 5 = excellent) and a short description. Take into account that this is an interviewer–candidate dialogue, answers should be concise, cover necessary details, and avoid unnecessary information. In the description explain why this score, and list main strengths and weaknesses of the answer. Reply with a single JSON object on one line, no markdown, no code blocks. Example: {"score": 4, "description": "Clear structure and relevant experience. Could add more concrete examples."}';

    const ENG_ANALYSIS_SYSTEM_PROMPT =
      'You are an English language evaluator for job interviews. Given the candidate\'s answer, evaluate their English level with a score from 1 to 5 (1 = very weak, 5 = native-like). In the description you MUST: (1) Quote or clearly point to each place where there was a grammar, vocabulary, or style error; (2) For each error, suggest the correct or better way to say it—more grammatically correct, more natural, or more professional. Do not check the punctuation marks and the style of writing numbers (for example, 8 or eight). Be specific: e.g. "In \'I have work there\' use \'I have worked there\' or \'I worked there\'." Reply with a single JSON object: {"score": number 1-5, "description": "your detailed feedback with exact error locations and corrections"}';

    function parseAnalysisResponse(content) {
      let raw = (content || '').trim();
      raw = raw.replace(/^```(?:json)?\s*/i, '').replace(/\s*```$/i, '');
      let jsonStr = raw.match(/\{[\s\S]*\}/);
      if (jsonStr) jsonStr = jsonStr[0];
      else jsonStr = raw;

      try {
        const parsed = JSON.parse(jsonStr);
        const score = typeof parsed.score === 'number' ? parsed.score : parseInt(parsed.score, 10);
        const num = Math.min(5, Math.max(1, isNaN(score) ? 3 : score));
        const desc = typeof parsed.description === 'string' ? parsed.description : String(parsed.description || '');
        return { score: num, description: desc };
      } catch (_) {
        const scoreMatch = raw.match(/"score"\s*:\s*(\d)|score\s*:\s*(\d)|(\d)\s*\/\s*5/i);
        const score = scoreMatch ? parseInt(scoreMatch[1] || scoreMatch[2] || scoreMatch[3], 10) : 3;
        const descMatch = raw.match(/"description"\s*:\s*"((?:[^"\\]|\\.)*)"|description\s*:\s*"((?:[^"\\]|\\.)*)"/i);
        const desc = (descMatch && (descMatch[1] || descMatch[2])) ? (descMatch[1] || descMatch[2]).replace(/\\"/g, '"') : raw;
        return {
          score: Math.min(5, Math.max(1, isNaN(score) ? 3 : score)),
          description: desc.length > 500 ? desc.slice(0, 497) + '...' : desc
        };
      }
    }

    async function getAnswerAnalysis(hrQuestion, userAnswer) {
      var userContent = 'Question: ' + hrQuestion + '\n\nCandidate\'s answer: ' + userAnswer;
      const response = await fetchWithTimeout('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + getOpenAiApiKey()
        },
        body: JSON.stringify({
          model: 'gpt-5-mini-2025-08-07',
          messages: [
            { role: 'system', content: ANALYSIS_SYSTEM_PROMPT },
            { role: 'user', content: userContent }
          ],
          response_format: { type: 'json_object' }
        })
      });
      if (!response.ok) {
        const err = await response.json().catch(() => ({ error: { message: response.statusText } }));
        throw new Error(err.error?.message || 'Analysis request failed');
      }
      const data = await response.json();
      const content = data.choices?.[0]?.message?.content?.trim() || '';
      if (!content) return { score: null, description: '' };
      return parseAnalysisResponse(content);
    }

    async function getEnglishFeedback(hrQuestion, userAnswer) {
      var userContent = 'Question: ' + hrQuestion + '\n\nCandidate\'s answer: ' + userAnswer;
      const response = await fetchWithTimeout('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + getOpenAiApiKey()
        },
        body: JSON.stringify({
          model: 'gpt-5-mini-2025-08-07',
          messages: [
            { role: 'system', content: ENG_ANALYSIS_SYSTEM_PROMPT },
            { role: 'user', content: userContent }
          ],
          response_format: { type: 'json_object' }
        })
      });
      if (!response.ok) {
        const err = await response.json().catch(() => ({ error: { message: response.statusText } }));
        throw new Error(err.error?.message || 'English feedback request failed');
      }
      const data = await response.json();
      const content = data.choices?.[0]?.message?.content?.trim() || '';
      if (!content) return { score: null, description: '' };
      return parseAnalysisResponse(content);
    }

    function delay(ms) {
      return new Promise(function (resolve) { setTimeout(resolve, ms); });
    }

    async function getAnswerAnalysisWithRetry(hrQuestion, userAnswer) {
      await delay(1500);
      var result = await getAnswerAnalysis(hrQuestion, userAnswer);
      var attempts = 1;
      while ((result.description === '' || result.score == null) && attempts < 3) {
        await delay(2000 * attempts);
        result = await getAnswerAnalysis(hrQuestion, userAnswer);
        attempts++;
      }
      if (!result.description && result.score == null) {
        result.description = 'Analysis returned no content.';
      }
      return result;
    }

    async function getEnglishFeedbackWithRetry(hrQuestion, userAnswer) {
      await delay(400);
      var result = await getEnglishFeedback(hrQuestion, userAnswer);
      var attempts = 1;
      while ((result.description === '' || result.score == null) && attempts < 3) {
        await delay(2000 * attempts);
        result = await getEnglishFeedback(hrQuestion, userAnswer);
        attempts++;
      }
      if (!result.description && result.score == null) {
        result.description = 'Analysis returned no content.';
      }
      return result;
    }

    async function sendUserMessage() {
      const text = userInputEl.value.trim();
      if (!text) return;

      const userMsgEl = addUserMessage(text);
      conversationHistory.push({ role: 'user', content: text });
      userInputEl.value = '';
      userInputEl.style.height = 'auto';

      if (!getOpenAiApiKey()) {
        addHrMessage('Add your OpenAI API key in Settings (main menu).', { error: true });
        return;
      }

      btnSend.disabled = true;
      addHrMessage('Thinking...', { loading: true });

      try {
        const reply = await getChatGptReply();
        conversationHistory.push({ role: 'assistant', content: reply });
        updateLastHrMessage(reply);

        const hrQuestion = conversationHistory[conversationHistory.length - 3]?.content || FIRST_HR_MESSAGE;
        var skillsPromise = getAnswerAnalysisWithRetry(hrQuestion, text);
        var engPromise = getEnglishFeedbackWithRetry(hrQuestion, text);
        var results = await Promise.allSettled([skillsPromise, engPromise]);
        var skillsResult = results[0].status === 'fulfilled' ? results[0].value : { score: null, description: (results[0].reason && results[0].reason.message) ? results[0].reason.message : 'Feedback could not be loaded.' };
        var engResult = results[1].status === 'fulfilled' ? results[1].value : { score: null, description: (results[1].reason && results[1].reason.message) ? results[1].reason.message : 'Feedback could not be loaded.' };
        attachFeedbackBlock(userMsgEl, 'Skills feedback', skillsResult);
        attachFeedbackBlock(userMsgEl, 'Eng feedback', engResult);
      } catch (err) {
        const msg = err.message || 'Could not get response';
        updateLastHrMessage('Error: ' + msg, true);
      } finally {
        btnSend.disabled = false;
      }
    }

    btnSend.addEventListener('click', sendUserMessage);
    userInputEl.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendUserMessage();
      }
    });

    userInputEl.addEventListener('input', function () {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    toolsInputEl.addEventListener('input', function () {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    btnAddWord.addEventListener('click', addWordToDictionary);

    addHrMessage(FIRST_HR_MESSAGE);
  </script>
