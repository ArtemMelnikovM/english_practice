<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vocabulary Practice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #e8e8e8;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.5rem 2rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      flex-shrink: 0;
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.5rem 0.85rem;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      color: rgba(232, 232, 232, 0.9);
      text-decoration: none;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .btn-back:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.25);
    }

    .header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding: 0 2rem;
    }

    .tab {
      padding: 1rem 1.5rem;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      color: rgba(232, 232, 232, 0.6);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }

    .tab:hover {
      color: rgba(232, 232, 232, 0.9);
    }

    .tab.active {
      color: #e94560;
      border-bottom-color: #e94560;
    }

    .content {
      flex: 1;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      padding: 2rem;
    }

    .panel {
      display: none;
    }

    .panel.active {
      display: block;
    }

    .dictionary-add {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .dictionary-search {
      margin-bottom: 1rem;
    }

    .dictionary-view-toggle {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .dictionary-view-btn {
      padding: 0.5rem 0.85rem;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      color: rgba(232, 232, 232, 0.85);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }

    .dictionary-view-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.25);
    }

    .dictionary-view-btn.active {
      color: #1a1a2e;
      background: rgba(233, 69, 96, 0.9);
      border-color: rgba(233, 69, 96, 0.95);
    }

    .add-word-list-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.35rem 0.75rem;
      margin-bottom: 1rem;
      font-size: 0.88rem;
      color: rgba(232, 232, 232, 0.75);
    }

    .add-word-list-row .add-word-list-label {
      font-weight: 600;
      margin-right: 0.25rem;
    }

    .add-word-list-row label {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      cursor: pointer;
      padding: 0.25rem 0.5rem;
      border-radius: 8px;
      transition: background 0.2s;
    }

    .add-word-list-row label:hover {
      background: rgba(255, 255, 255, 0.06);
    }

    .add-word-list-row input {
      accent-color: #e94560;
    }

    .dictionary-practice-filter {
      margin-bottom: 1rem;
    }

    .dictionary-practice-filter .dictionary-subtype-label {
      margin-bottom: 0.5rem;
    }

    .dictionary-item-wordlist {
      display: inline-block;
      margin-left: 0.5rem;
      padding: 0.12rem 0.45rem;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: rgba(26, 26, 46, 0.95);
      background: rgba(255, 255, 255, 0.35);
      border-radius: 4px;
      vertical-align: middle;
    }

    .dictionary-item-wordlist.it {
      background: rgba(78, 205, 196, 0.85);
      color: #0f3460;
    }

    .dictionary-item-wordlist.general {
      background: rgba(255, 200, 87, 0.9);
      color: #1a1a2e;
    }

    .phrasal-learned-wrap {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
    }

    .phrasal-learned-toggle {
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      color: rgba(232, 232, 232, 0.95);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      padding: 0.5rem 0.85rem;
      cursor: pointer;
      width: 100%;
      text-align: left;
      transition: background 0.2s, border-color 0.2s;
    }

    .phrasal-learned-toggle:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.25);
    }

    .phrasal-learned-list {
      margin-top: 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      max-height: 200px;
      overflow-y: auto;
    }

    .phrasal-learned-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      padding: 0.35rem 0.5rem;
      font-size: 0.88rem;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 6px;
    }

    .btn-phrasal-unlearn {
      font-family: inherit;
      font-size: 0.75rem;
      padding: 0.25rem 0.5rem;
      color: rgba(232, 232, 232, 0.9);
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      cursor: pointer;
    }

    .btn-phrasal-unlearn:hover {
      background: rgba(233, 69, 96, 0.35);
      border-color: rgba(233, 69, 96, 0.6);
    }

    .btn-mark-phrasal {
      margin-top: 0.75rem;
      padding: 0.55rem 1rem;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      color: #1a1a2e;
      background: linear-gradient(135deg, #4ecdc4 0%, #44a08d 100%);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-mark-phrasal:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(78, 205, 196, 0.35);
    }

    .btn-mark-phrasal:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .phrasal-topic-wrap {
      margin-bottom: 1.25rem;
      padding: 1rem 1.25rem;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
    }

    .phrasal-topic-wrap[hidden] {
      display: none !important;
    }

    .phrasal-topic-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
      gap: 0.5rem;
    }

    .phrasal-topic-option {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.45rem 0.65rem;
      font-size: 0.85rem;
      color: rgba(232, 232, 232, 0.92);
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .phrasal-topic-option:has(input:checked) {
      border-color: rgba(78, 205, 196, 0.65);
      background: rgba(78, 205, 196, 0.12);
    }

    .phrasal-topic-option:hover {
      border-color: rgba(255, 255, 255, 0.22);
    }

    .phrasal-topic-option input {
      accent-color: #4ecdc4;
    }

    .dictionary-input {
      flex: 1;
      padding: 0.85rem 1rem;
      font-family: inherit;
      font-size: 1rem;
      color: #e8e8e8;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      transition: border-color 0.2s, background 0.2s;
    }

    .dictionary-input::placeholder {
      color: rgba(232, 232, 232, 0.4);
    }

    .dictionary-input:focus {
      outline: none;
      border-color: rgba(233, 69, 96, 0.6);
      background: rgba(255, 255, 255, 0.08);
    }

    .btn-add {
      padding: 0.85rem 1.25rem;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      color: #1a1a2e;
      background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-add:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(233, 69, 96, 0.4);
    }

    .dictionary-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .dictionary-item {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
      padding: 0.75rem 1rem;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }

    .dictionary-item-main {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .dictionary-item-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      min-width: 0;
      cursor: pointer;
    }

    .dictionary-item-text {
      font-size: 1rem;
      color: #e8e8e8;
      word-break: break-word;
    }

    .dictionary-item-date {
      font-size: 0.75rem;
      color: rgba(232, 232, 232, 0.5);
    }

    .dictionary-item-date.not-practiced {
      color: rgba(240, 193, 75, 0.6);
      font-style: italic;
    }

    .btn-delete {
      padding: 0.35rem 0.65rem;
      font-family: inherit;
      font-size: 0.75rem;
      font-weight: 600;
      color: #e8e8e8;
      background: rgba(255, 107, 107, 0.3);
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .btn-delete:hover {
      background: rgba(255, 107, 107, 0.5);
    }

    .btn-learned {
      padding: 0.35rem 0.65rem;
      font-family: inherit;
      font-size: 0.75rem;
      font-weight: 600;
      color: #e8e8e8;
      background: rgba(78, 205, 196, 0.25);
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .btn-learned:hover {
      background: rgba(78, 205, 196, 0.45);
    }

    .dictionary-item-extra {
      width: 100%;
      display: none;
      padding-top: 0.65rem;
      border-top: 1px solid rgba(255, 255, 255, 0.12);
    }

    .dictionary-item-extra.visible {
      display: block;
    }

    .dictionary-extra-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: rgba(232, 232, 232, 0.65);
      margin-bottom: 0.4rem;
    }

    .dictionary-extra-btn {
      padding: 0.35rem 0.65rem;
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 600;
      color: #e8e8e8;
      background: rgba(233, 69, 96, 0.25);
      border: 1px solid rgba(233, 69, 96, 0.4);
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 0.55rem;
    }

    .dictionary-extra-btn:hover {
      background: rgba(233, 69, 96, 0.4);
    }

    .dictionary-translation {
      margin-bottom: 0.75rem;
      padding: 0.5rem 0.7rem;
      background: rgba(0, 0, 0, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      font-size: 0.9rem;
      line-height: 1.5;
      color: rgba(232, 232, 232, 0.95);
      white-space: pre-wrap;
    }

    .dictionary-examples {
      margin: 0;
      padding-left: 1.15rem;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      color: rgba(232, 232, 232, 0.9);
      font-size: 0.9rem;
      line-height: 1.45;
    }

    .dictionary-details-note {
      font-size: 0.85rem;
      color: rgba(232, 232, 232, 0.6);
      font-style: italic;
      margin-bottom: 0.6rem;
    }

    .dictionary-empty {
      padding: 2rem;
      text-align: center;
      color: rgba(232, 232, 232, 0.5);
      font-size: 0.95rem;
    }

    .practice-mode-selector {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .practice-mode-option {
      flex: 1 1 200px;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.04);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .practice-mode-option:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .practice-mode-option:has(input:checked) {
      background: rgba(233, 69, 96, 0.1);
      border-color: rgba(233, 69, 96, 0.5);
    }

    .practice-mode-option input {
      display: none;
    }

    .practice-mode-label {
      font-size: 1rem;
      font-weight: 600;
      color: #e8e8e8;
    }

    .practice-mode-desc {
      font-size: 0.8rem;
      color: rgba(232, 232, 232, 0.6);
      line-height: 1.4;
    }

    .dictionary-subtype-wrap {
      margin-bottom: 1.25rem;
      padding: 1rem 1.25rem;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
    }

    .dictionary-subtype-wrap[hidden] {
      display: none !important;
    }

    .dictionary-subtype-label {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: rgba(232, 232, 232, 0.55);
      margin-bottom: 0.65rem;
    }

    .dictionary-subtype-options {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .dictionary-subtype-option {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      padding: 0.75rem 1rem;
      background: rgba(255, 255, 255, 0.04);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .dictionary-subtype-option:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .dictionary-subtype-option:has(input:checked) {
      background: rgba(233, 69, 96, 0.1);
      border-color: rgba(233, 69, 96, 0.45);
    }

    .dictionary-subtype-option input {
      display: none;
    }

    .dictionary-subtype-title {
      font-size: 0.92rem;
      font-weight: 600;
      color: #e8e8e8;
    }

    .dictionary-subtype-desc {
      font-size: 0.78rem;
      color: rgba(232, 232, 232, 0.55);
      line-height: 1.35;
    }

    .practice-context-list {
      margin: 0.5rem 0 0;
      padding-left: 1.25rem;
      font-size: 1rem;
      line-height: 1.55;
      color: rgba(232, 232, 232, 0.92);
    }

    .feedback-section-title.correct {
      color: #4ecdc4;
    }

    .practice-area {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .practice-prompt {
      padding: 1.5rem;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
    }

    .practice-label {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: rgba(232, 232, 232, 0.6);
      margin-bottom: 0.5rem;
    }

    .practice-text {
      font-size: 1.1rem;
      line-height: 1.6;
      color: #e8e8e8;
    }

    .practice-hint {
      margin-top: 0.75rem;
    }

    .practice-hint-toggle {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.35rem 0.7rem;
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 600;
      color: rgba(232, 232, 232, 0.7);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .practice-hint-toggle:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.25);
    }

    .practice-hint-toggle::before {
      content: '▶';
      font-size: 0.65em;
      transition: transform 0.2s;
    }

    .practice-hint-toggle.expanded::before {
      transform: rotate(90deg);
    }

    .practice-hint-content {
      display: none;
      margin-top: 0.5rem;
      padding: 0.4rem 0.7rem;
      font-size: 0.9rem;
      font-weight: 600;
      color: #f0c14b;
      background: rgba(240, 193, 75, 0.15);
      border-radius: 6px;
    }

    .practice-hint-content.visible {
      display: inline-block;
    }

    .practice-input-area {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .practice-textarea {
      width: 100%;
      padding: 1rem 1.25rem;
      font-family: inherit;
      font-size: 1rem;
      color: #e8e8e8;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      resize: none;
      min-height: 100px;
      max-height: 60vh;
      overflow-y: hidden;
      transition: border-color 0.2s, background 0.2s;
    }

    .practice-textarea::placeholder {
      color: rgba(232, 232, 232, 0.4);
    }

    .practice-textarea:focus {
      outline: none;
      border-color: rgba(233, 69, 96, 0.6);
      background: rgba(255, 255, 255, 0.08);
    }

    .practice-actions {
      display: flex;
      gap: 0.75rem;
    }

    .btn-check {
      padding: 0.85rem 1.5rem;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      color: #1a1a2e;
      background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-check:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(233, 69, 96, 0.4);
    }

    .btn-check:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-next {
      padding: 0.85rem 1.5rem;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      color: #e8e8e8;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .btn-next:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .feedback-block {
      padding: 1.5rem;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      display: none;
    }

    .feedback-block.visible {
      display: block;
    }

    .feedback-section {
      margin-bottom: 1.25rem;
    }

    .feedback-section:last-child {
      margin-bottom: 0;
    }

    .feedback-section-title {
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.5rem;
    }

    .feedback-section-title.score {
      color: #f0c14b;
    }

    .feedback-section-title.errors {
      color: #ff6b6b;
    }

    .feedback-section-title.alternatives {
      color: #4ecdc4;
    }

    .feedback-content {
      font-size: 0.95rem;
      line-height: 1.6;
      color: rgba(232, 232, 232, 0.9);
      white-space: pre-wrap;
    }

    .practice-empty {
      padding: 3rem;
      text-align: center;
      color: rgba(232, 232, 232, 0.5);
    }

    .practice-empty-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .practice-empty-text {
      font-size: 1rem;
      margin-bottom: 1.5rem;
    }

    .btn-go-dictionary {
      padding: 0.75rem 1.25rem;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;

  <script src="api-config.js"></script>
  <script>
    const DICT_STORAGE_KEY = 'hr-interview-examples';
    const PHRASAL_LEARNED_KEY = 'vocabulary-phrasal-learned';
    const PHRASAL_TOPIC_KEY = 'vocabulary-phrasal-topic';
    const API_TIMEOUT_MS = 60000;

      general: 'General — mixed everyday situations (no single fixed theme)',

      { id: 'pv-001', phrase: 'carry out' },

      { id: 'pv-033', phrase: 'fall behind' },

      { id: 'pv-035', phrase: 'drill down' },
      { id: 'pv-036', phrase: 'map out' },
      { id: 'pv-037', phrase: 'flesh out' },
      { id: 'pv-038', phrase: 'zero in on' },
      { id: 'pv-039', phrase: 'touch base' },
      { id: 'pv-040', phrase: 'loop in' },
      { id: 'pv-041', phrase: 'back up' },
      { id: 'pv-042', phrase: 'check in' },
      { id: 'pv-043', phrase: 'opt out' },
      { id: 'pv-044', phrase: 'wire up' },
      { id: 'pv-045', phrase: 'phase out' }
    ];

    const tabs = document.querySelectorAll('.tab');
    const panels = document.querySelectorAll('.panel');
    const dictInput = document.getElementById('dictInput');
    const dictSearchInput = document.getElementById('dictSearchInput');
    const btnViewLearning = document.getElementById('btnViewLearning');
    const btnViewLearned = document.getElementById('btnViewLearned');
    const btnAddWord = document.getElementById('btnAddWord');
    const dictList = document.getElementById('dictList');
    const practiceArea = document.getElementById('practiceArea');
    const practiceDictInput = document.getElementById('practiceDictInput');
    const btnAddPracticeWord = document.getElementById('btnAddPracticeWord');
    const dictionarySubtypeWrap = document.getElementById('dictionarySubtypeWrap');
    const dictionaryPracticeFilterWrap = document.getElementById('dictionaryPracticeFilterWrap');
    const btnPracticeDictIT = document.getElementById('btnPracticeDictIT');
    const btnPracticeDictGeneral = document.getElementById('btnPracticeDictGeneral');
    const btnWordListIT = document.getElementById('btnWordListIT');
    const btnWordListGeneral = document.getElementById('btnWordListGeneral');
    const phrasalLearnedWrap = document.getElementById('phrasalLearnedWrap');
    const phrasalLearnedToggle = document.getElementById('phrasalLearnedToggle');
    const phrasalLearnedList = document.getElementById('phrasalLearnedList');
    const phrasalLearnedCount = document.getElementById('phrasalLearnedCount');
    const phrasalTopicWrap = document.getElementById('phrasalTopicWrap');

    let currentWordId = null;
    let currentWord = null;
    let currentPromptRu = '';
    let practiceMode = null;
    /** 'sentence' | 'word' — only when practiceMode === 'dictionary' */
    let dictionaryPracticeSubtype = 'sentence';
    let currentWordRuDisplay = '';
    let currentExamplesRu = [];
    let dictionaryView = 'learning';
    /** 'it' | 'general' — which word list is shown in Dictionary */
    let dictionaryWordListView = 'it';
    /** 'it' | 'general' — which list is used for “From Dictionary” practice */
    let practiceDictionaryWordList = 'general';
    let currentPhrasalId = null;
    let expandedWordId = null;
    const shownTranslationById = {};

    function syncPracticePanelAuxUi() {
      if (dictionarySubtypeWrap) {
        dictionarySubtypeWrap.hidden = practiceMode !== 'dictionary';
      }
      if (dictionaryPracticeFilterWrap) {
        dictionaryPracticeFilterWrap.hidden = practiceMode !== 'dictionary';
      }
      if (phrasalTopicWrap) {
        phrasalTopicWrap.hidden = practiceMode !== 'phrasal';
      }
      if (phrasalLearnedWrap) {
        phrasalLearnedWrap.hidden = practiceMode !== 'phrasal';
        if (practiceMode === 'phrasal') {
          renderPhrasalLearnedPanel();
        }
      }
    }

    function getSelectedPhrasalTopic() {
      var el = document.querySelector('input[name="phrasalTopic"]:checked');
      var v = el && el.value ? el.value : 'general';
      return PHRASAL_TOPIC_DESCRIPTIONS[v] ? v : 'general';
    }

    function savePhrasalTopicPreference() {
      try {
        localStorage.setItem(PHRASAL_TOPIC_KEY, getSelectedPhrasalTopic());
      } catch (_) {}
    }

    function restorePhrasalTopic() {
      try {
        var saved = localStorage.getItem(PHRASAL_TOPIC_KEY);
        if (!saved || !PHRASAL_TOPIC_DESCRIPTIONS[saved]) return;
        var input = document.querySelector('input[name="phrasalTopic"][value="' + saved + '"]');
        if (input) input.checked = true;
      } catch (_) {}
    }

    document.querySelectorAll('input[name="practiceMode"]').forEach(function (radio) {
      radio.addEventListener('change', function () {
        practiceMode = this.value;
        syncPracticePanelAuxUi();
        loadPractice();
      });
    });

    document.querySelectorAll('input[name="dictionarySubtype"]').forEach(function (radio) {
      radio.addEventListener('change', function () {
        dictionaryPracticeSubtype = this.value;
        if (practiceMode === 'dictionary') {
          loadPractice();
        }
      });
    });

    document.querySelectorAll('input[name="phrasalTopic"]').forEach(function (radio) {
      radio.addEventListener('change', function () {
        savePhrasalTopicPreference();
        if (practiceMode === 'phrasal') {
          loadPractice();
        }
      });
    });

    tabs.forEach(function (tab) {
      tab.addEventListener('click', function () {
        tabs.forEach(function (t) { t.classList.remove('active'); });
        panels.forEach(function (p) { p.classList.remove('active'); });
        tab.classList.add('active');
        var panelId = 'panel' + tab.dataset.tab.charAt(0).toUpperCase() + tab.dataset.tab.slice(1);
        document.getElementById(panelId).classList.add('active');
        if (tab.dataset.tab === 'practice') {
          showPracticeInitialState();
        }
      });
    });

    function itemWordList(item) {
      return item.wordList === 'it' ? 'it' : 'general';
    }

    function getDictionary() {
      try {
        var raw = localStorage.getItem(DICT_STORAGE_KEY);
        var list = raw ? JSON.parse(raw) : [];
        return Array.isArray(list) ? list : [];
      } catch (_) {
        return [];
      }
    }

    function migrateWordListsOnce() {
      try {
        var list = getDictionary();
        var changed = false;
        list.forEach(function (item) {
          if (item.wordList !== 'it' && item.wordList !== 'general') {
            item.wordList = 'general';
            changed = true;
          }
        });
        if (changed) saveDictionary(list);
      } catch (_) {}
    }

    function getLearnedPhrasalIds() {
      try {
        var raw = localStorage.getItem(PHRASAL_LEARNED_KEY);
        var arr = raw ? JSON.parse(raw) : [];
        return Array.isArray(arr) ? arr : [];
      } catch (_) {
        return [];
      }
    }

    function saveLearnedPhrasalIds(ids) {
      try {
        localStorage.setItem(PHRASAL_LEARNED_KEY, JSON.stringify(ids));
      } catch (_) {}
    }

    function markPhrasalVerbLearned(id) {
      var ids = getLearnedPhrasalIds();
      if (ids.indexOf(id) === -1) {
        ids.push(id);
        saveLearnedPhrasalIds(ids);
      }
      renderPhrasalLearnedPanel();
    }

    function unmarkPhrasalVerbLearned(id) {
      var ids = getLearnedPhrasalIds().filter(function (x) { return x !== id; });
      saveLearnedPhrasalIds(ids);
      renderPhrasalLearnedPanel();
    }

    function renderPhrasalLearnedPanel() {
      if (!phrasalLearnedCount || !phrasalLearnedList) return;
      var learned = getLearnedPhrasalIds();
      phrasalLearnedCount.textContent = String(learned.length);
      phrasalLearnedList.innerHTML = '';
      if (learned.length === 0) {
        phrasalLearnedList.innerHTML = '<div class="dictionary-empty" style="padding:0.5rem 0;font-size:0.85rem;">No phrasal verbs marked as learned yet.</div>';
        return;
      }
      var byId = {};
      POPULAR_PHRASAL_VERBS.forEach(function (pv) { byId[pv.id] = pv.phrase; });
      learned.forEach(function (id) {
        var phrase = byId[id] || id;
        var row = document.createElement('div');
        row.className = 'phrasal-learned-item';
        row.innerHTML =
          '<span>' + escapeHtml(phrase) + '</span>' +
          '<button type="button" class="btn-phrasal-unlearn" data-phrasal-id="' + escapeHtml(id) + '">Remove</button>';
        row.querySelector('.btn-phrasal-unlearn').addEventListener('click', function () {
          unmarkPhrasalVerbLearned(id);
          if (practiceMode === 'phrasal') {
            loadPractice();
          }
        });
        phrasalLearnedList.appendChild(row);
      });
    }

    function setPracticeDictionaryWordList(wl) {
      practiceDictionaryWordList = wl === 'it' ? 'it' : 'general';
      if (btnPracticeDictIT && btnPracticeDictGeneral) {
        btnPracticeDictIT.classList.toggle('active', practiceDictionaryWordList === 'it');
        btnPracticeDictGeneral.classList.toggle('active', practiceDictionaryWordList === 'general');
      }
    }

    function getSelectedWordListDictionary() {
      var el = document.querySelector('input[name="addWordListDictionary"]:checked');
      return el && el.value === 'it' ? 'it' : 'general';
    }

    function getSelectedWordListPractice() {
      var el = document.querySelector('input[name="addWordListPractice"]:checked');
      return el && el.value === 'it' ? 'it' : 'general';
    }

    /** Same pool for “full sentence” and “word only” dictionary practice */
    function getLearningDictionaryWords() {
      return getDictionary().filter(function (item) {
        if (item.learned) return false;
        return itemWordList(item) === practiceDictionaryWordList;
      });
    }

    /** DOM is source of truth — keeps Check in sync with the exercise on screen */
    function getCurrentDictionarySubtype() {
      var el = document.querySelector('input[name="dictionarySubtype"]:checked');
      return el && el.value === 'word' ? 'word' : 'sentence';
    }

    function saveDictionary(list) {
      try {
        localStorage.setItem(DICT_STORAGE_KEY, JSON.stringify(list));
      } catch (_) {}
    }

    async function addWord(text, wordList) {
      var t = (text || '').trim();
      if (!t) return;
      var wl = wordList === 'it' ? 'it' : 'general';
      var list = getDictionary();
      if (list.some(function (x) { return x.text.toLowerCase() === t.toLowerCase(); })) return;

      var newId = Date.now();
      list.unshift({
        id: newId,
        text: t,
        wordList: wl,
        createdAt: new Date().toISOString(),
        learned: false,
        translationRu: [],
        examplesEn: [],
        detailsReady: false
      });
      saveDictionary(list);
      renderDictionary();

      if (!getOpenAiApiKey()) return;

      try {
        var details = await generateDictionaryDetails(t);
        var updatedList = getDictionary();
        var item = updatedList.find(function (x) { return x.id === newId; });
        if (!item) return;
        item.translationRu = details.translationRu;
        item.examplesEn = details.examplesEn;
        item.detailsReady = true;
        item.detailsError = '';
        saveDictionary(updatedList);
        renderDictionary();
      } catch (err) {
        var failedList = getDictionary();
        var failedItem = failedList.find(function (x) { return x.id === newId; });
        if (!failedItem) return;
        failedItem.detailsReady = false;
        failedItem.detailsError = err && err.message ? err.message : 'Failed to generate details';
        saveDictionary(failedList);
        renderDictionary();
      }
    }

    function deleteWord(id) {
      var list = getDictionary().filter(function (x) { return x.id !== id; });
      saveDictionary(list);
      renderDictionary();
    }

    function setWordLearned(id, learned) {
      var list = getDictionary();
      var item = list.find(function (x) { return x.id === id; });
      if (!item) return;
      item.learned = !!learned;
      saveDictionary(list);
      renderDictionary();
    }

    function updateLastPracticed(id) {
      var list = getDictionary();
      var item = list.find(function (x) { return x.id === id; });
      if (item) {
        item.lastPracticed = new Date().toISOString();
        saveDictionary(list);
      }
    }

    function selectNextWord(list) {
      if (list.length === 0) return null;
      var neverPracticed = list.filter(function (x) { return !x.lastPracticed; });
      if (neverPracticed.length > 0) {
        return neverPracticed[Math.floor(Math.random() * neverPracticed.length)];
      }
      var sorted = list.slice().sort(function (a, b) {
        return new Date(a.lastPracticed) - new Date(b.lastPracticed);
      });
      var oldestCount = Math.min(3, sorted.length);
      return sorted[Math.floor(Math.random() * oldestCount)];
    }

    function escapeHtml(str) {
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function formatDate(isoString) {
      if (!isoString) return null;
      var d = new Date(isoString);
      if (isNaN(d.getTime())) return null;
      var day = String(d.getDate()).padStart(2, '0');
      var month = String(d.getMonth() + 1).padStart(2, '0');
      var year = d.getFullYear();
      var hours = String(d.getHours()).padStart(2, '0');
      var minutes = String(d.getMinutes()).padStart(2, '0');
      return day + '-' + month + '-' + year + ' ' + hours + ':' + minutes;
    }

    function renderDictionary() {
      var list = getDictionary();
      list = list.filter(function (item) {
        return dictionaryView === 'learned' ? !!item.learned : !item.learned;
      });
      list = list.filter(function (item) {
        return itemWordList(item) === dictionaryWordListView;
      });

      var query = (dictSearchInput && dictSearchInput.value ? dictSearchInput.value : '').trim().toLowerCase();
      if (query) {
        list = list.filter(function (item) {
          return (item.text || '').toLowerCase().includes(query);
        });
      }

      btnViewLearning.classList.toggle('active', dictionaryView === 'learning');
      btnViewLearned.classList.toggle('active', dictionaryView === 'learned');
      if (btnWordListIT && btnWordListGeneral) {
        btnWordListIT.classList.toggle('active', dictionaryWordListView === 'it');
        btnWordListGeneral.classList.toggle('active', dictionaryWordListView === 'general');
      }

      dictList.innerHTML = '';
      if (list.length === 0) {
        if (query) {
          dictList.innerHTML = '<div class="dictionary-empty">No matches found for your search.</div>';
        } else if (dictionaryView === 'learned') {
          dictList.innerHTML = '<div class="dictionary-empty">No learned words in this list yet.</div>';
        } else {
          dictList.innerHTML =
            '<div class="dictionary-empty">No words in the ' +
            (dictionaryWordListView === 'it' ? 'IT' : 'General') +
            ' list yet. Add a word and choose this list above.</div>';
        }
        return;
      }
      list.forEach(function (item) {
        if (!Array.isArray(item.translationRu)) item.translationRu = [];
        if (!Array.isArray(item.examplesEn)) item.examplesEn = [];

        var el = document.createElement('div');
        el.className = 'dictionary-item';
        var lastPracticedHtml = item.lastPracticed
          ? '<span class="dictionary-item-date">Last practiced: ' + formatDate(item.lastPracticed) + '</span>'
          : '<span class="dictionary-item-date not-practiced">Not practiced yet</span>';

        var isExpanded = expandedWordId === item.id;
        var translationVisible = !!shownTranslationById[item.id];

        var translationHtml = '';
        if (translationVisible) {
          var ruText = item.translationRu.length
            ? item.translationRu.map(function (line, idx) { return (idx + 1) + '. ' + line; }).join('\n')
            : 'No translation available.';
          translationHtml = '<div class="dictionary-translation">' + escapeHtml(ruText) + '</div>';
        }

        var examplesHtml = '';
        if (item.examplesEn.length) {
          examplesHtml = '<ol class="dictionary-examples">' + item.examplesEn.map(function (example) {
            return '<li>' + escapeHtml(example) + '</li>';
          }).join('') + '</ol>';
        } else if (item.detailsError) {
          examplesHtml = '<div class="dictionary-details-note">Could not load details: ' + escapeHtml(item.detailsError) + '</div>';
        } else {
          examplesHtml = '<div class="dictionary-details-note">Generating translation and examples...</div>';
        }

    function fetchWithTimeout(url, options) {
      var ctrl = new AbortController();
      var id = setTimeout(function () { ctrl.abort(); }, API_TIMEOUT_MS);
      return fetch(url, Object.assign({}, options, { signal: ctrl.signal })).then(function (r) {
        clearTimeout(id);
        return r;
      }, function (err) {
        clearTimeout(id);
        if (err.name === 'AbortError') throw new Error('Request timed out');
        throw err;
      });
    }

      var nextHeight = Math.min(textarea.scrollHeight, maxHeightPx);

        }
        document.getElementById('userTranslation').addEventListener('keydown', function (e) {
          if (e.key === 'Enter' && e.ctrlKey) {
            handleCheck();
          }
        });
      } catch (err) {
        practiceArea.innerHTML = '<div class="practice-empty"><div class="practice-empty-text">Error: ' + escapeHtml(err.message) + '</div></div>';
      }
    }

    async function handleCheck() {
      var textarea = document.getElementById('userTranslation');
      var btnCheck = document.getElementById('btnCheck');
      var feedbackBlock = document.getElementById('feedbackBlock');
      var translation = textarea.value.trim();
      if (!translation) return;

      btnCheck.disabled = true;
      btnCheck.textContent = 'Checking...';
      feedbackBlock.classList.remove('visible');

      try {
        var subtypeNow = getCurrentDictionarySubtype();
        var isWordOnly = practiceMode === 'dictionary' && subtypeNow === 'word';
        var isPhrasal = practiceMode === 'phrasal';

        if (isWordOnly) {
          var wRes = await checkWordOnlyAnswer(
            currentWord,
            translation,
            currentWordRuDisplay,
            currentExamplesRu
          );
          var okMsg = (wRes.message && wRes.message.trim()) ? wRes.message.trim() : 'Correct — well done!';
          if (wRes.isCorrect) {
            feedbackBlock.innerHTML =
              '<div class="feedback-section">' +
              '<div class="feedback-section-title correct">Correct</div>' +
              '<div class="feedback-content">' + escapeHtml(okMsg) + '</div>' +
              '</div>';
          } else {
            var badMsg = (wRes.message && wRes.message.trim()) ? wRes.message.trim() : 'See explanation below.';
            feedbackBlock.innerHTML =
              '<div class="feedback-section">' +
              '<div class="feedback-section-title errors">Incorrect</div>' +
              '<div class="feedback-content">' + escapeHtml(badMsg) + '</div>' +
              '</div>';
          }
        } else if (isPhrasal) {
          var resultPv = await checkTranslation(currentPromptRu, translation, currentWord);
          feedbackBlock.innerHTML =
            '<div class="feedback-section">' +
            '<div class="feedback-section-title score">Score: ' + starsFromScore(resultPv.score) + ' (' + resultPv.score + '/5)</div>' +
            '</div>' +
            '<div class="feedback-section">' +
            '<div class="feedback-section-title alternatives">Corrected Answer</div>' +
            '<div class="feedback-content">' + escapeHtml(resultPv.corrected || 'No corrections needed') + '</div>' +
            '</div>' +
            '<div class="feedback-section">' +
            '<div class="feedback-section-title errors">Errors & Corrections</div>' +
            '<div class="feedback-content">' + escapeHtml(resultPv.errors) + '</div>' +
            '</div>' +
            '<div class="feedback-section">' +
            '<div class="feedback-section-title alternatives">B2-C1 Alternatives</div>' +
            '<div class="feedback-content">' + escapeHtml(resultPv.alternatives) + '</div>' +
            '</div>';
        } else {
          var result = await checkTranslation(currentPromptRu, translation, currentWord);
          feedbackBlock.innerHTML =
            '<div class="feedback-section">' +
            '<div class="feedback-section-title score">Score: ' + starsFromScore(result.score) + ' (' + result.score + '/5)</div>' +
            '</div>' +
            '<div class="feedback-section">' +
            '<div class="feedback-section-title alternatives">Corrected Answer</div>' +
            '<div class="feedback-content">' + escapeHtml(result.corrected || 'No corrections needed') + '</div>' +
            '</div>' +
            '<div class="feedback-section">' +
            '<div class="feedback-section-title errors">Errors & Corrections</div>' +
            '<div class="feedback-content">' + escapeHtml(result.errors) + '</div>' +
            '</div>' +
            '<div class="feedback-section">' +
            '<div class="feedback-section-title alternatives">B2-C1 Alternatives</div>' +
            '<div class="feedback-content">' + escapeHtml(result.alternatives) + '</div>' +
            '</div>';
        }
        feedbackBlock.classList.add('visible');
        /* Same as “full sentence” mode: any completed Check updates lastPracticed for this dictionary item */
        if (practiceMode === 'dictionary' && currentWordId) {
          updateLastPracticed(currentWordId);
        }
      } catch (err) {
        feedbackBlock.innerHTML = '<div class="feedback-content">Error: ' + escapeHtml(err.message) + '</div>';
        feedbackBlock.classList.add('visible');
      } finally {
        btnCheck.disabled = false;
        btnCheck.textContent = 'Check';
      }
    }
  </script>
</body>
</html>
